name: argo-ops
version: 0.2.0
entry_point: __init__:register
toolset: argo_ops
description: >-
  Policy-enforced business operations for Argo campaigns.
  Includes campaign lifecycle (strategy, funding, launch),
  creator management (discovery, outreach, negotiation),
  content QA, payouts, learning, email polling, operator
  notifications, and Hermes cron task orchestration
  (preflight, claim, complete, fail).
requires_env:
  - ARGO_INTERNAL_API_URL
  - ARGO_AGENT_TOKEN
